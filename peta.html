<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Peta Kerja Interaktif</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    height:100%;
}

#map{
    width:100%;
    height:100vh;
}
</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-3.0,111.9],9);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

// LOAD GEOJSON
fetch('data/delineasi.geojson')
.then(response => response.json())
.then(data => {

    var delineasi = L.geoJSON(data,{
        style:{
            color:'red',
            weight:2,
            fillOpacity:0.2
        }
    }).addTo(map);

    map.fitBounds(delineasi.getBounds());

});

</script>

</body>
</html>
